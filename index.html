<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Study — YourWebTeam.io</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0A0B1A; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: pointer; }
        .loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0A0B1A; display: flex; align-items: center;
            justify-content: center; flex-direction: column; z-index: 10;
            transition: opacity 0.5s ease;
        }
        .loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(17,98,236,0.2); border-top-color: #1162EC;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        .loader-text { color: #8892A4; font-size: 14px; font-family: -apple-system, sans-serif; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading presentation...</div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        var RIV_FILE = './wordpress_case_study_rive.riv';
        var canvas = document.getElementById('canvas');
        var loader = document.getElementById('loader');

        function sizeCanvas() {
            canvas.width = window.innerWidth * (window.devicePixelRatio || 1);
            canvas.height = window.innerHeight * (window.devicePixelRatio || 1);
        }
        sizeCanvas();

        function loadScript(url) {
            return new Promise(function(resolve, reject) {
                var s = document.createElement('script');
                s.src = url; s.onload = resolve; s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        (async function() {
            // Load WebGL runtime
            var cdns = [
                'https://unpkg.com/@rive-app/webgl@2.33.1/rive.js',
                'https://cdn.jsdelivr.net/npm/@rive-app/webgl@2.33.1/rive.js',
                'https://unpkg.com/@rive-app/webgl/rive.js'
            ];
            for (var i = 0; i < cdns.length; i++) {
                try {
                    await loadScript(cdns[i]);
                    if (typeof rive !== 'undefined') break;
                } catch(e) {}
            }

            // Init Rive fullscreen
            var r = new rive.Rive({
                src: RIV_FILE,
                canvas: canvas,
                autoplay: true,
                stateMachines: 'State machine',
                fit: rive.Fit.Cover,
                alignment: rive.Alignment.Center,
                onLoad: function() {
                    r.resizeDrawingSurfaceToCanvas();
                    loader.classList.add('hidden');
                },
                onLoadError: function(e) {
                    document.querySelector('.loader-text').textContent = 'Failed to load. Please refresh.';
                    document.querySelector('.spinner').style.display = 'none';
                }
            });

            // Listen for CTA click event from Rive
            try {
                r.on(rive.EventType.RiveEvent, function(event) {
                    if (event.data.name === 'openDiscoveryCall') {
                        window.open('https://yourwebteam.io/call', '_blank');
                    }
                });
            } catch(e) {}

            // Resize handler
            window.addEventListener('resize', function() {
                sizeCanvas();
                if (r) r.resizeDrawingSurfaceToCanvas();
            });
        })();
    </script>
</body>
</html>
