<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study — YourWebTeam.io</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0B1A; color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .container { width: 100%; max-width: 1200px; padding: 20px; }
        .rive-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%;
            background: #060810; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .rive-wrapper canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .controls {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; margin-top: 20px; flex-wrap: wrap;
        }
        .controls button {
            background: rgba(17,98,236,0.15); border: 1px solid rgba(17,98,236,0.3);
            color: #09B5F1; padding: 10px 20px; border-radius: 8px;
            cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s;
        }
        .controls button:hover {
            background: rgba(17,98,236,0.3); border-color: #1162EC;
        }
        .slide-indicator { color: #8892A4; font-size: 13px; font-weight: 500; }
        .footer {
            margin-top: 24px; text-align: center; opacity: 0.4;
            font-size: 12px; color: #8892A4;
        }
        .footer a { color: #09B5F1; text-decoration: none; }
        .status {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center; z-index: 10;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(17,98,236,0.2); border-top-color: #1162EC;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .debug { margin-top: 12px; font-size: 11px; color: #555; word-break: break-all; }
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .controls button { padding: 8px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="rive-wrapper" id="rive-wrapper">
            <div class="status" id="status">
                <div class="spinner" id="spinner"></div>
                <div id="status-text" style="color:#8892A4;font-size:14px;">Loading presentation...</div>
                <div class="debug" id="debug"></div>
            </div>
            <canvas id="rive-canvas"></canvas>
        </div>
        <div class="controls" id="controls" style="display:none;">
            <button id="btn-prev">&#8592; Prev</button>
            <span class="slide-indicator" id="slide-indicator">Slide 1 / 11</span>
            <button id="btn-next">Next &#8594;</button>
            <button id="btn-replay">&#8635; Replay</button>
        </div>
        <div class="footer">
            <a href="https://yourwebteam.io" target="_blank">YourWebTeam.io</a> — WordPress to Headless Transformations
        </div>
    </div>

    <script>
        // ========== CONFIG ==========
        const RIV_FILE = './wordpress_case_study_rive.riv';
        const STATE_MACHINE = 'State machine';
        const TOTAL_SLIDES = 11;

        // ========== DOM ==========
        const canvas = document.getElementById('rive-canvas');
        const statusEl = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        const spinnerEl = document.getElementById('spinner');
        const debugEl = document.getElementById('debug');
        const controlsEl = document.getElementById('controls');
        const slideIndicator = document.getElementById('slide-indicator');

        let currentSlide = 1;
        let riveInstance = null;
        let slideInput = null;

        function log(msg) { console.log('[RiveLoader]', msg); debugEl.textContent = msg; }
        function showError(msg) {
            spinnerEl.style.display = 'none';
            statusText.style.color = '#E61D6B';
            statusText.innerHTML = msg;
        }
        function updateSlide() {
            slideIndicator.textContent = 'Slide ' + currentSlide + ' / ' + TOTAL_SLIDES;
        }
        function goToSlide(num) {
            if (num < 1 || num > TOTAL_SLIDES) return;
            currentSlide = num;
            updateSlide();
            if (slideInput) slideInput.value = currentSlide;
        }

        function loadScript(url) {
            return new Promise(function(resolve, reject) {
                var s = document.createElement('script');
                s.src = url;
                s.onload = resolve;
                s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        // ========== BOOT ==========
        async function boot() {
            // 1. Load Rive runtime
            var cdns = [
                'https://unpkg.com/@rive-app/canvas@2.15.6/rive.js',
                'https://cdn.jsdelivr.net/npm/@rive-app/canvas@2.15.6/rive.js',
                'https://unpkg.com/@rive-app/canvas/rive.js'
            ];
            var loaded = false;
            for (var i = 0; i < cdns.length; i++) {
                try {
                    log('Loading runtime from CDN ' + (i+1) + '...');
                    await loadScript(cdns[i]);
                    if (typeof rive !== 'undefined') { loaded = true; break; }
                } catch(e) { console.warn('CDN failed:', cdns[i]); }
            }
            if (!loaded) {
                showError('Could not load Rive runtime.<br>Check your internet connection and try refreshing.');
                return;
            }
            log('Runtime loaded. Checking .riv file...');

            // 2. Fetch .riv as ArrayBuffer (avoids MIME type issues on GitHub Pages)
            var rivBuffer;
            try {
                var resp = await fetch(RIV_FILE);
                if (!resp.ok) {
                    showError('Cannot find .riv file (HTTP ' + resp.status + ').<br>Make sure <strong>' + RIV_FILE + '</strong> is in the repo root.');
                    return;
                }
                rivBuffer = await resp.arrayBuffer();
                log('File loaded (' + Math.round(rivBuffer.byteLength / 1024 / 1024 * 10) / 10 + ' MB). Initializing...');
            } catch(e) {
                showError('Network error loading .riv file:<br>' + e.message);
                return;
            }

            // 3. Size the canvas
            var wrapper = document.getElementById('rive-wrapper');
            canvas.width = wrapper.offsetWidth * (window.devicePixelRatio || 1);
            canvas.height = wrapper.offsetHeight * (window.devicePixelRatio || 1);

            // 4. Init Rive with the buffer directly
            try {
                riveInstance = new rive.Rive({
                    buffer: new Uint8Array(rivBuffer),
                    canvas: canvas,
                    autoplay: true,
                    stateMachines: STATE_MACHINE,
                    fit: rive.Fit.Contain,
                    alignment: rive.Alignment.Center,
                    onLoad: function() {
                        log('Animation playing!');
                        statusEl.style.display = 'none';
                        controlsEl.style.display = 'flex';
                        riveInstance.resizeDrawingSurfaceToCanvas();

                        try {
                            var inputs = riveInstance.stateMachineInputs(STATE_MACHINE);
                            if (inputs && inputs.length > 0) {
                                log('Inputs: ' + inputs.map(function(i){return i.name;}).join(', '));
                                slideInput = inputs.find(function(i){return i.name === 'slide';});
                            }
                        } catch(e) {}
                        updateSlide();
                    },
                    onLoadError: function(e) {
                        showError('Animation failed to initialize.<br>The .riv file may use a newer Rive format.<br>Try re-exporting from Rive editor.');
                        log('onLoadError: ' + JSON.stringify(e));
                    }
                });

                try {
                    riveInstance.on(rive.EventType.RiveEvent, function(event) {
                        if (event.data.name === 'openDiscoveryCall') {
                            window.open('https://yourwebteam.io/call', '_blank');
                        }
                    });
                } catch(e) {}

            } catch(e) {
                showError('Rive init error: ' + e.message);
                console.error(e);
            }
        }

        boot();

        // ========== CONTROLS ==========
        document.getElementById('btn-prev').addEventListener('click', function(){ goToSlide(currentSlide - 1); });
        document.getElementById('btn-next').addEventListener('click', function(){ goToSlide(currentSlide + 1); });
        document.getElementById('btn-replay').addEventListener('click', function(){ goToSlide(1); });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goToSlide(currentSlide + 1); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); goToSlide(currentSlide - 1); }
            if (e.key === 'r' || e.key === 'R') goToSlide(1);
        });

        window.addEventListener('resize', function() {
            if (riveInstance) {
                var wrapper = document.getElementById('rive-wrapper');
                canvas.width = wrapper.offsetWidth * (window.devicePixelRatio || 1);
                canvas.height = wrapper.offsetHeight * (window.devicePixelRatio || 1);
                riveInstance.resizeDrawingSurfaceToCanvas();
            }
        });
    </script>
</body>
</html>
