<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Case Study — YourWebTeam.io</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #0A0B1A; font-family: 'DM Sans', sans-serif;
        }

        /* ========== FULLSCREEN CANVAS ========== */
        #canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw !important; height: 100vh !important;
            display: block;
        }

        /* ========== START SCREEN ========== */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0A0B1A; z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; user-select: none;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #start-screen.hidden {
            opacity: 0; visibility: hidden; pointer-events: none;
        }

        /* Ambient glow */
        #start-screen::before {
            content: ''; position: absolute;
            width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(17,98,236,0.08) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .start-logo {
            width: 80px; height: auto; margin-bottom: 32px;
            opacity: 0; animation: fadeUp 0.8s 0.2s ease forwards;
        }
        .start-title {
            color: #fff; font-size: 28px; font-weight: 800;
            letter-spacing: -0.5px; margin-bottom: 8px; text-align: center;
            opacity: 0; animation: fadeUp 0.8s 0.4s ease forwards;
        }
        .start-subtitle {
            color: #8892A4; font-size: 15px; font-weight: 400;
            margin-bottom: 40px; text-align: center;
            opacity: 0; animation: fadeUp 0.8s 0.6s ease forwards;
        }

        .start-button {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 40px; border-radius: 50px;
            background: linear-gradient(135deg, #1162EC, #B261FE);
            color: #fff; font-size: 16px; font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            border: none; cursor: pointer;
            box-shadow: 0 8px 32px rgba(17,98,236,0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            opacity: 0; animation: fadeUp 0.8s 0.8s ease forwards;
        }
        .start-button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 40px rgba(17,98,236,0.4);
        }
        .start-button:active { transform: scale(0.98); }

        /* Play icon */
        .play-icon {
            width: 0; height: 0;
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent #fff;
        }

        .start-hint {
            position: absolute; bottom: 32px;
            color: #555; font-size: 12px;
            opacity: 0; animation: fadeUp 0.8s 1s ease forwards;
        }

        /* ========== LOADING OVERLAY ========== */
        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0A0B1A; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(17,98,236,0.15); border-top-color: #1162EC;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        .loader-text { color: #8892A4; font-size: 13px; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        <div class="start-title">WordPress Case Study</div>
        <div class="start-subtitle">50-Plugin Nightmare → $250K Revenue Machine</div>

        <button class="start-button" id="start-btn">
            <div class="play-icon"></div>
            Watch Presentation
        </button>

        <div class="start-hint">Click to start with audio</div>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loader" style="display:none;">
        <div class="spinner"></div>
        <div class="loader-text">Loading animation...</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        var RIV_FILE = './wordpress_case_study_rive.riv';
        var canvas = document.getElementById('canvas');
        var startScreen = document.getElementById('start-screen');
        var loader = document.getElementById('loader');
        var riveInstance = null;

        // Size canvas to fill viewport exactly
        function sizeCanvas() {
            var dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            if (riveInstance) riveInstance.resizeDrawingSurfaceToCanvas();
        }

        function loadScript(url) {
            return new Promise(function(resolve, reject) {
                var s = document.createElement('script');
                s.src = url; s.onload = resolve; s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        // User clicks start → hide start screen, show loader, init Rive
        document.getElementById('start-btn').addEventListener('click', startPresentation);
        startScreen.addEventListener('click', function(e) {
            if (e.target === startScreen) startPresentation();
        });

        async function startPresentation() {
            startScreen.classList.add('hidden');
            loader.style.display = 'flex';
            sizeCanvas();

            // Load WebGL runtime
            var cdns = [
                'https://unpkg.com/@rive-app/webgl@2.33.1/rive.js',
                'https://cdn.jsdelivr.net/npm/@rive-app/webgl@2.33.1/rive.js',
                'https://unpkg.com/@rive-app/webgl/rive.js'
            ];
            for (var i = 0; i < cdns.length; i++) {
                try {
                    await loadScript(cdns[i]);
                    if (typeof rive !== 'undefined') break;
                } catch(e) {}
            }

            if (typeof rive === 'undefined') {
                document.querySelector('.loader-text').textContent = 'Failed to load. Please refresh.';
                return;
            }

            // Init Rive — fullscreen, edge to edge
            riveInstance = new rive.Rive({
                src: RIV_FILE,
                canvas: canvas,
                autoplay: true,
                stateMachines: 'State machine',
                fit: rive.Fit.Fill,
                alignment: rive.Alignment.Center,
                onLoad: function() {
                    sizeCanvas();
                    loader.classList.add('hidden');
                },
                onLoadError: function() {
                    document.querySelector('.loader-text').textContent = 'Failed to load. Please refresh.';
                    document.querySelector('.spinner').style.display = 'none';
                }
            });

            // CTA event
            try {
                riveInstance.on(rive.EventType.RiveEvent, function(event) {
                    if (event.data.name === 'openDiscoveryCall') {
                        window.open('https://yourwebteam.io/call', '_blank');
                    }
                });
            } catch(e) {}
        }

        // Resize
        window.addEventListener('resize', sizeCanvas);
    </script>
